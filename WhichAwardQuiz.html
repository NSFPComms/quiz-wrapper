<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexible Quiz</title>
<style>
  :root {
    /* TEXT SIZES */
    --title-size: 32px;
    --question-size: 22px;
    --option-size: 18px;

    /* COLORS */
    --bg-color: #f5f7fb;
    --card-color: #ffffff;
    --primary-color: #252e2e;
    --option-bg: #f0f4f8;
    --option-hover: #dbeafe;
    --option-text: #222;
    --progress-bg: #e5e7eb;
    --progress-fill: #3b82f6;

    /* SHAPES */
    --border-radius: 12px;
    --option-radius: 25px;

    /* SHADOW */
    --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg-color);
    margin: 0;
    padding: 10px;
  }

  #container {
    max-width: 750px;
    margin: 40px auto;
    background: var(--card-color);
    padding: 30px;
    border-radius: var(--border-radius);
    box-shadow: var(--card-shadow);
  }

  h1 {
    font-size: var(--title-size);
    text-align: center;
    color: var(--primary-color);
    margin-bottom: 10px;
  }

  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 15px;
  }

  h2 {
    font-size: var(--question-size);
    margin: 0;
    flex: 1;
  }

  .question-counter {
    font-size: 16px;
    color: #6b7280;
    white-space: nowrap;
    font-weight: 500;
  }

  .progress-container {
    width: 100%;
    height: 8px;
    background: var(--progress-bg);
    border-radius: 10px;
    overflow: hidden;
    margin: 20px 0;
  }

  .progress-bar {
    height: 100%;
    background: var(--progress-fill);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 10px;
  }

  button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    font-size: var(--option-size);
    background: var(--option-bg);
    color: var(--option-text);
    border: none;
    border-radius: var(--option-radius);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }

  button:hover {
    background: var(--option-hover);
    transform: scale(1.02);
  }

  button:active {
    transform: scale(0.98);
  }

  .result-title {
    position: relative;
    display: inline-block;
    margin-bottom: 10px;
  }

  .result-title::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 3px;
    background: var(--progress-fill);
    animation: underlineSlide 1s ease forwards;
  }

  @keyframes underlineSlide {
    0% {
      width: 0;
      opacity: 1;
    }
    70% {
      width: 100%;
      opacity: 1;
    }
    100% {
      width: 100%;
      opacity: 0;
    }
  }

  .result-card {
    margin-bottom: 20px;
    padding: 20px;
    border: 2px solid #3b82f6;
    border-radius: 12px;
    background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
  }

  .result-card h3 {
    color: var(--primary-color);
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 24px;
  }

  .result-card p {
    color: #4b5563;
    line-height: 1.6;
    margin: 0;
  }

  .other-results-section {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 2px solid #e5e7eb;
  }

  .other-results-title {
    font-size: 20px;
    color: var(--primary-color);
    margin-bottom: 20px;
    text-align: center;
  }

  .other-result-card {
    margin-bottom: 15px;
    padding: 15px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #f9fafb;
  }

  .other-result-card h4 {
    color: var(--primary-color);
    margin-top: 0;
    margin-bottom: 8px;
    font-size: 18px;
  }

  .other-result-card p {
    color: #6b7280;
    line-height: 1.5;
    margin: 0;
    font-size: 15px;
  }

  /* Mobile responsiveness */
  @media (max-width: 768px) {
    :root {
      --title-size: 26px;
      --question-size: 20px;
      --option-size: 16px;
    }

    #container {
      margin: 20px auto;
      padding: 20px;
    }

    .question-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    h2 {
      font-size: 20px;
    }

    .question-counter {
      align-self: flex-end;
      font-size: 14px;
    }

    button {
      padding: 12px;
      font-size: 16px;
    }

    .result-card h3 {
      font-size: 20px;
    }
  }

  @media (max-width: 480px) {
    :root {
      --title-size: 22px;
      --question-size: 18px;
      --option-size: 15px;
    }

    body {
      padding: 5px;
    }

    #container {
      padding: 15px;
      margin: 10px auto;
    }

    h1 {
      font-size: 22px;
    }

    .result-card {
      padding: 15px;
    }

    .other-result-card {
      padding: 12px;
    }
  }
</style>
</head>
<body>

<div id="container">
  <h1>What Type of Award Program Are You?</h1>
  <hr style="margin: 1.5rem 15%;" />
  <div id="quiz"></div>
  <div id="result" style="display:none;"></div>
</div>

<script>

// ===== EDIT ONLY THIS BLOCK =====
const rawData = `
OUTCOMES:
Grad Study Abroad
Professional Opportunity
UK Grad Study
English Teaching Abroad
Domestic Grad Study/Research

DESCRIPTIONS:
Immersive, globally focused research with cross-cultural collaboration.
Career-building experiences that prepare you for leadership and industry impact.
Specialized academic study in the UK with historic and cutting-edge institutions.
Hands-on cultural exchange through teaching and community engagement abroad.
Advanced academic work within the U.S. focused on deep research and scholarship.

---

When I imagine myself next fall, I am…
Chatting over a book in a café in Amsterdam (1,2)
looking at 500-year-old documents in an Oxford archive (3)
Playing with Taiwanese kindergartners at recess (4)
writing a research article at the Library of Congress (5)
---
My dream job is…
conducting research in my field (1)
working in whatever professional field my heart desires (2)
serving as an ambassador or FSO (3)
teaching or working at a university (4,5)
---
If you could have a super power, what would it be? 
Teleportation (1)
Telepathy (2,4)
Time Travel (3)
Freeze Time (5)
---
What is your screensaver/lock screen photo?
Natural Landscapes (1,3)
Abstract Art (2)
Something Inspirational (4)
A Cherished Person/Memory (5)
---
Which genre of music is dominating your queue?
Lo Fi (1,5)
Movie Soundtracks (2)
Rock (3)
Rap/Hip Hop (4)
---
If you were in of a band, which role would you play? 
Keyboard (1)
Lead Singer (2,4)
Drummer (3)
Bass (5)
---
What's your go-to coffee order?
mix it up, fam! What's new on the menu? (1)
Regular drip coffee (cream and sugar optional) (2,5)
Black tea with milk (3)
Matcha latte (4)
---
What's your dream vacation spot?
historical adventure, European castles or Buddhist stupas… (1,3)
a modern city with museums, restaurants, and all the sites (2)
a tropical beach, book in one hand, coconut in the other… (4)
Disneyland, baby! (5)
---
What is your preferred creative outlet?
Playing/Composing Music (1,5)
Drawing (2)
Writing (3)
Dancing (4)
---
What's the best place to study?
A Common Room (1)
A Cafe/ Coffe shop (2)
The Library (3,4)
From the comfort of my dorm (5)
---
You're cooking a meal! What are you going for? 
Depends on the ingredients I have (1)
Whatever's the quickest (2)
A new recipe I saw online (3)
A Family Recipe (4,5)
---
You are given the chance to time travel; where and when are you going? 
I'd go somewhere else and to the future (1)
I'd stay here and travel to the future (2,5)
I'd go somewhere else and to the past (3)
I'd stay here and travel to the past (4)
---
Which sounds more like you? 
"I have a research question I'm excited to investigate" (1,5)
"I want to build skills and real-world experience before committing to a path" (2)
"The UK is doing cutting-edge research in my field" (3)
"I'd like to get outside my comfort zone and try something new" (4)
---
Pick one movie to watch…
Midnight in Paris (you're a romantic and an intellectual and you know it) (1)
Outsourced (You're ready to show up somewhere new, figure it out as you go, and probably learn a LOT on the way) (2,4)
The Theory of Everything (Cambridge mystique is a personality type) (3)
Good Will Hunting (you have a question only you can answer, and you're ready to dig in) (5)
---
Which of these afternoon snacks sounds the best?
A mystery item from a bakery where you couldn't read the sign but pointed confidently (1)
A very good coffee and something from the nice nearby cafe you've already scoped out (2,5)
Proper tea and a biscuit, at a specific time, in a specific, non-negotiable mug (3)
Street food you found by following a crowd (4)
---
What do you want people to say about your fellowship year(s) when it's over?
They connected with international scholars in their field (1)
They came back ready to lead (2)
They earned their place at a world-class institution (3,5)
They built something new (4)
`;
// ===============================


// Parse logic
function parseQuiz(text) {
  const sections = text.split('---').map(s => s.trim()).filter(Boolean);

  // Split outcomes + descriptions section
  const header = sections[0];

  const outcomesPart = header.split('DESCRIPTIONS:')[0]
    .replace('OUTCOMES:', '')
    .trim();

  const descriptionsPart = header.split('DESCRIPTIONS:')[1]
    .trim();

  const outcomes = outcomesPart.split('\n').map(s => s.trim());
  const descriptions = descriptionsPart.split('\n').map(s => s.trim());

  const questions = sections.slice(1).map(sec => {
    const lines = sec.split('\n').map(l => l.trim()).filter(Boolean);
    const q = lines[0];

    const options = lines.slice(1).map(line => {
      const match = line.match(/\((.*?)\)$/);
      const buckets = match[1].split(',').map(n => parseInt(n.trim()) - 1);
      const text = line.replace(/\(.*?\)$/, '').trim();
      return { text, buckets };
    });

    return { q, options };
  });

  return { outcomes, descriptions, questions };
}

const data = parseQuiz(rawData);

let scores = Array(data.outcomes.length).fill(0);
let current = 0;

const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function updateProgress() {
  const progress = (current / data.questions.length) * 100;
  const progressBar = document.querySelector('.progress-bar');
  if (progressBar) {
    progressBar.style.width = progress + '%';
  }
}

function showQuestion() {
  if (current >= data.questions.length) return showResult();

  const q = data.questions[current];
  const totalQuestions = data.questions.length;
  
  quizDiv.innerHTML = `
    <div class="question-header">
      <h2>${q.q}</h2>
      <span class="question-counter">${current + 1}/${totalQuestions}</span>
    </div>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  `;

  updateProgress();

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt.text;

    btn.onclick = () => {
      opt.buckets.forEach(b => scores[b]++);
      current++;
      showQuestion();
    };

    quizDiv.appendChild(btn);
  });
}

function showResult() {
  quizDiv.style.display = 'none';
  resultDiv.style.display = 'block';

  const max = Math.max(...scores);
  const winningIndices = [];

  let resultsHTML = '<h2 style="text-align: center; margin-bottom: 30px;">Your Result:</h2>';
  
  data.outcomes.forEach((outcome, i) => {
    if (scores[i] === max) {
      winningIndices.push(i);
      resultsHTML += `
        <div class="result-card">
          <h3 class="result-title">${outcome}</h3>
          <p>${data.descriptions[i]}</p>
        </div>
      `;
    }
  });

  // Add "Other Possible Results" section
  resultsHTML += '<div class="other-results-section">';
  resultsHTML += '<h3 class="other-results-title">Other Possible Results</h3>';
  
  data.outcomes.forEach((outcome, i) => {
    if (!winningIndices.includes(i)) {
      resultsHTML += `
        <div class="other-result-card">
          <h4>${outcome}</h4>
          <p>${data.descriptions[i]}</p>
        </div>
      `;
    }
  });
  
  resultsHTML += '</div>';

  resultDiv.innerHTML = resultsHTML;
}

showQuestion();

</script>
</body>
</html>
